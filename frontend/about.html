<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BigBox — About</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1e1e2e; --bg-hover: #313244; --btn-bg: #45475a;
      --text: #cdd6f4; --text-muted: #a6adc8; --border: #313244;
    }
    html, body {
      width: 100vw; height: 100vh;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px; overflow: hidden;
    }
    /* ── Titlebar ─────────────────────────────── */
    #titlebar {
      height: 30px; background: #0f1116;
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; padding: 0 4px;
      user-select: none; -webkit-user-select: none;
      border-bottom: 1px solid var(--border);
    }
    .titlebar-title { grid-column: 2; font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .titlebar-btns  { grid-column: 3; display: flex; gap: 4px; justify-self: end; }
    .titlebar-btn {
      display: flex; align-items: center; justify-content: center;
      width: 26px; height: 22px;
      background: transparent; border: none; border-radius: 4px;
      cursor: pointer; color: var(--text-muted);
      transition: background 0.1s, color 0.1s;
    }
    .titlebar-btn:hover { background: var(--bg-hover); color: var(--text); }
    .titlebar-btn-close:hover { background: #f38ba8; color: #1e1e2e; }
    /* ── Content ──────────────────────────────── */
    #content {
      height: calc(100vh - 30px);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px; padding: 24px;
      text-align: center;
    }
    #content img { border-radius: 22px; display: block; }
    h1 { font-size: 22px; font-weight: 700; margin-top: 12px; }
    .subtitle { font-size: 13px; color: var(--text-muted); }
    .author { color: var(--text-muted); font-size: 13px; margin-top: 4px; }
    .author strong { color: var(--text); font-weight: 600; }
    .links { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 12px; }
    .link-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 9px 16px; border-radius: 8px;
      background: var(--btn-bg); color: var(--text-muted);
      text-decoration: none; font-size: 13px;
      border: none; cursor: pointer; width: 100%;
      transition: background 0.15s, color 0.15s;
    }
    .link-btn:hover { background: var(--bg-hover); color: var(--text); }
    .link-btn-support { background: #2d1f3d; color: #ff8a8a; }
    .link-btn-support:hover { background: #3d1f4d; color: #ffaaaa; }

    .license{font-size:11px;color:var(--text-muted);margin:2px 0 8px;}
    .license-link{color:var(--accent);text-decoration:none;cursor:pointer;}
    .license-link:hover{text-decoration:underline;}
  </style>
</head>
<body>
  <div id="titlebar" data-tauri-drag-region>
    <span></span>
    <span class="titlebar-title">Sobre o BigBox</span>
    <div class="titlebar-btns">
      <button id="btn-close" class="titlebar-btn titlebar-btn-close" title="Fechar">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="content">
    <img src="bigbox.svg" alt="BigBox" width="80" height="80">
    <h1>BigBox</h1>
    <p class="subtitle">All your apps, in one window.</p>
    <p class="author">por <strong>Heitor Faria</strong></p>
    <p class="license"><a class="license-link" id="btn-license" href="#">GNU Affero GPL v3</a></p>
    <div class="links">
      <button class="link-btn" id="btn-github">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z"/>
        </svg>
        github.com/podheitor/bigbox
      </button>
      <button class="link-btn link-btn-support" id="btn-youtube">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
        </svg>
        Apoiar o projeto no YouTube
      </button>
    </div>
  </div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const { getCurrentWindow } = window.__TAURI__.window;
    const win = getCurrentWindow();

    document.getElementById('btn-close').addEventListener('click', () => win.close());

        document.getElementById('btn-license').addEventListener('click', async(e)=>{e.preventDefault();await invoke('open_url',{url:'https://www.gnu.org/licenses/agpl-3.0'});});
    document.getElementById('btn-github').addEventListener('click', async () => {
      try { await invoke('open_url', { url: 'https://github.com/podheitor/bigbox' }); }
      catch(e) { console.error(e); }
    });

    document.getElementById('btn-youtube').addEventListener('click', async () => {
      try { await invoke('open_url', { url: 'https://www.youtube.com/@PodHeitor/join' }); }
      catch(e) { console.error(e); }
    });
  </script>
</body>
</html>
