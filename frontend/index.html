<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BigBox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Custom titlebar replaces system decorations -->
  <div id="titlebar" data-tauri-drag-region>
    <span class="titlebar-title">BigBox</span>
    <div class="titlebar-btns">
      <button id="btn-minimize" class="titlebar-btn" title="Minimizar">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="11" width="18" height="2" rx="1"/></svg>
      </button>
      <button id="btn-maximize" class="titlebar-btn" title="Maximizar">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="1"/></svg>
      </button>
      <button id="btn-close" class="titlebar-btn titlebar-btn-close" title="Fechar">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
  </div>
  <div id="app">
    <!-- Single row: icon sidebar + content -->
    <div id="main-row">
      <!-- Sidebar: icon-only, 64px wide -->
      <aside id="sidebar">
        <ul id="service-list"></ul>

        <div class="sidebar-footer">
          <!-- Add service -->
          <button id="btn-add" class="icon-btn sidebar-icon-btn" title="Add service">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
          </button>

          <!-- Mute toggle -->
          <button id="btn-mute" class="icon-btn sidebar-icon-btn mute-btn" title="Mute all" data-muted="false">
            <svg id="icon-sound" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
            </svg>
            <svg id="icon-muted" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none">
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
            </svg>
          </button>
        <!-- About -->
          <button id="btn-about" class="icon-btn sidebar-icon-btn" title="About BigBox">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
            </svg>
          </button>
        </div>
      </aside>

      <!-- Content area: service WebViews from Tauri go here -->
      <main id="content">
        <div id="welcome">
          <div class="welcome-inner">
            <img src="bigbox.svg" class="welcome-logo" alt="BigBox" width="96" height="96">
            <h1>BigBox</h1>
            <p>All your apps, in one window.</p>
            <button class="btn-primary" id="btn-welcome-add">Add your first service</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Add / Manage Services dialog -->
  <dialog id="dialog-add">
    <div class="dialog-header">
      <h2>Manage Services</h2>
      <button id="btn-dialog-close" class="icon-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
    <div class="dialog-body">
      <section class="dialog-section">
        <h3>Available services</h3>
        <div id="catalog-grid"></div>
      </section>
      <section class="dialog-section" id="section-active" style="display:none">
        <h3>Your active services</h3>
        <ul id="active-list"></ul>
      </section>
    </div>
  </dialog>

  
  <!-- About dialog -->
  <dialog id="dialog-about">
    <div class="dialog-header">
      <h2>About BigBox</h2>
      <button id="btn-about-close" class="icon-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
    <div class="dialog-body about-body">
      <div class="about-logo">
        <img src="bigbox.svg" alt="BigBox" width="80" height="80">
      </div>
      <h3 class="about-title">BigBox</h3>
      <p class="about-subtitle">All your apps, in one window.</p>
      <div class="about-details">
        <p>by <strong>Heitor Faria</strong></p>
        <a href="https://github.com/podheitor/bigbox" class="about-link" target="_blank">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z"/></svg>
          github.com/podheitor/bigbox
        </a>
        <a href="https://www.youtube.com/@PodHeitor/join" class="about-link about-support" target="_blank">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
          Apoiar o projeto no YouTube
        </a>
      </div>
    </div>
  </dialog>

  <script>
    // Prevent WebKit's default "Inspect Element" context menu app-wide
    document.addEventListener('contextmenu', e => {
      // Allow context menu on service items (sidebar handles its own right-click menu)
      if (e.target.closest('.service-item')) {
        return; // let the sidebar handler manage it
      }
      // Allow default only outside the shell UI (never for our custom elements)
      e.preventDefault();
    });
  </script>
  <script src="app.js"></script>
</body>
</html>
