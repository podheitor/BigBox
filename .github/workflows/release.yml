name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Ubuntu 22.04 — .deb for jammy + a portable AppImage. The AppImage is built
  # against the older 22.04 glibc/webkit so it also runs on newer distros and on
  # Arch-based systems like BigLinux (our universal-Linux artifact).
  build-linux-2204:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build .deb + AppImage
        run: cargo tauri build --bundles deb,appimage

      # Both Ubuntu jobs emit BigBox_<ver>_amd64.deb; tag the distro into the
      # filename so the two debs don't collide when attached to the release.
      - name: Tag distro into .deb filename
        run: |
          f=$(ls src-tauri/target/release/bundle/deb/*.deb)
          mv "$f" "${f%_amd64.deb}_amd64_ubuntu22.04.deb"

      - name: Upload .deb (Ubuntu 22.04)
        uses: actions/upload-artifact@v4
        with:
          name: bigbox-ubuntu-22.04-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload AppImage (universal Linux / BigLinux)
        uses: actions/upload-artifact@v4
        with:
          name: bigbox-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

  # Ubuntu 24.04 — .deb for noble, built against its own glibc/webkit so the
  # dependency pins match that release.
  build-linux-2404:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build .deb
        run: cargo tauri build --bundles deb

      - name: Tag distro into .deb filename
        run: |
          f=$(ls src-tauri/target/release/bundle/deb/*.deb)
          mv "$f" "${f%_amd64.deb}_amd64_ubuntu24.04.deb"

      - name: Upload .deb (Ubuntu 24.04)
        uses: actions/upload-artifact@v4
        with:
          name: bigbox-ubuntu-24.04-deb
          path: src-tauri/target/release/bundle/deb/*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build MSI & NSIS
        run: cargo tauri build --bundles msi,nsis

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: bigbox-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS
        uses: actions/upload-artifact@v4
        with:
          name: bigbox-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: [build-linux-2204, build-linux-2404, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/bigbox-ubuntu-22.04-deb/*.deb
            artifacts/bigbox-ubuntu-24.04-deb/*.deb
            artifacts/bigbox-linux-appimage/*.AppImage
            artifacts/bigbox-windows-msi/*.msi
            artifacts/bigbox-windows-nsis/*.exe
          generate_release_notes: true
